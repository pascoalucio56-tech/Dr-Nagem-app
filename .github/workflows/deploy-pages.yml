name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Build Web Assets
        run: |
          mkdir -p www_dist
          cp index.html index.css app.js manifest.json www_dist/
          # Se houver pasta assets, copie aqui
          # cp -r assets www_dist/ || true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './www_dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
